<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Philippine rice terraces and agricultural fields at sunrise">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#87CEEB" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#4A8B5C"/>
      <stop offset="100%" stop-color="#1B4D2E"/>
    </linearGradient>
    <linearGradient id="terrace1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D6B3F"/>
      <stop offset="50%" stop-color="#3D8B52"/>
      <stop offset="100%" stop-color="#1B4D2E"/>
    </linearGradient>
    <linearGradient id="terrace2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3D8B52"/>
      <stop offset="50%" stop-color="#4DA562"/>
      <stop offset="100%" stop-color="#2D6B3F"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA8C8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3D8B9C" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Distant mountains -->
  <polygon points="0,400 320,250 640,380 960,200 1280,350 1600,180 1920,320 1920,1080 0,1080" fill="#1B4D2E" opacity="0.5"/>
  <polygon points="0,500 400,380 800,480 1200,350 1600,450 1920,380 1920,1080 0,1080" fill="#2D6B3F" opacity="0.6"/>
  <!-- Rice terraces -->
  <path d="M0,650 Q480,600 960,640 T1920,620 L1920,1080 L0,1080Z" fill="url(#terrace1)"/>
  <path d="M0,720 Q480,680 960,710 T1920,690 L1920,1080 L0,1080Z" fill="url(#terrace2)"/>
  <path d="M0,790 Q480,760 960,780 T1920,760 L1920,1080 L0,1080Z" fill="url(#terrace1)"/>
  <path d="M0,860 Q480,830 960,850 T1920,830 L1920,1080 L0,1080Z" fill="url(#terrace2)"/>
  <!-- Water reflections in terraces -->
  <ellipse cx="400" cy="700" rx="200" ry="15" fill="url(#water)"/>
  <ellipse cx="960" cy="770" rx="280" ry="18" fill="url(#water)"/>
  <ellipse cx="1400" cy="840" rx="220" ry="14" fill="url(#water)"/>
  <!-- Sun -->
  <circle cx="1600" cy="180" r="80" fill="#F5A623" opacity="0.7"/>
  <circle cx="1600" cy="180" r="100" fill="#F5A623" opacity="0.2"/>
</svg>
